<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | DINORAH</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">DINORAH</a>
            <nav>
                <a href="index.html#collections">Collections</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h1 class="section-title" style="font-size: 2rem; margin-bottom: 2rem;">Create Account</h1>
            <form id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" class="form-control" required
                            minlength="6">
                        <button type="button" class="password-toggle" id="togglePassword">Show</button>
                    </div>
                    <small style="color: grey; font-size: 0.7rem;">Minimum 6 characters</small>
                </div>
                <div class="form-group admin-key-group" style="display: none;">
                    <label>Admin Key (Optional)</label>
                    <div class="password-wrapper">
                        <input type="password" name="adminKey" id="adminKey" class="form-control">
                        <button type="button" class="password-toggle" id="toggleAdminKey">Show</button>
                    </div>
                    <small style="color: grey; font-size: 0.7rem;">Only for admin account creation</small>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showAdminKey">
                        <span>I have an admin key</span>
                    </label>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <p style="margin-top: 1rem; font-size: 0.9rem;">
                Already a member? <a href="login.html" style="color: var(--gold);">Sign In</a>
            </p>
        </div>
    </main>

    <script>
        // Toggle Password Visibility Logic
        function setupPasswordToggle(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);

            toggle.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                toggle.textContent = type === 'password' ? 'Show' : 'Hide';
            });
        }

        setupPasswordToggle('password', 'togglePassword');
        setupPasswordToggle('adminKey', 'toggleAdminKey');

        // Toggle admin key field visibility
        document.getElementById('showAdminKey').addEventListener('change', (e) => {
            const adminKeyGroup = document.querySelector('.admin-key-group');
            adminKeyGroup.style.display = e.target.checked ? 'block' : 'none';
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const submitBtn = form.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    if (result.isAdmin) {
                        alert('Admin account created successfully! Please sign in.');
                    } else {
                        alert('Account created successfully! Please sign in.');
                    }
                    window.location.href = '/login.html';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                console.error(err);
                alert('Signup failed. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
